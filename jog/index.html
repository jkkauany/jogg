<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>🤖 Robô Codificador PRO</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="editor">

    <div class="editor-header">
      <span>📝 Seu código — Nível 1</span>
      <span style="color:#ffd93d; cursor:pointer;" onclick="mostrartutorial()">💡 Tutorial</span>
    </div>

    <textarea 
      id="codigo" 
      placeholder="Digite seus comandos..."
      class="codigo-area"
    ></textarea>

    <div class="controls">
      <button onclick="executarCodigo()" class="btn-exec">▶️ Executar</button>
      <button onclick="mostrartutorial()" class="btn-tutorial">📖 Tutorial</button>
      <button onclick="resetNivelAtual()" class="btn-reset">🔄 Reset</button>
    </div>

    <div id="status" class="status"></div>
  </div>

  <div class="grid-container">
    <canvas id="canvas" width="560" height="560"></canvas>
  </div>
</div>

<div id="modal-tutorial">
  <div class="modal-content">
    <h2>📖 Comandos</h2>
    <ul>
      <li><strong>moverEsquerda()</strong></li>
      <li><strong>moverDireita()</strong></li>
      <li><strong>moverCima()</strong></li>
      <li><strong>moverBaixo()</strong></li>
    </ul>
    <button onclick="fecharModal()" class="btn-fechar">Fechar</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
